name: 部署到 Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 构建前端
        run: node frontend/build.js

      - name: 安装 Wrangler
        run: npm install -g wrangler

      - name: 替换 wrangler.toml 占位符
        run: |
          sed -i "s|{CF_D1_ID}|${{ secrets.CF_D1_ID }}|g" wrangler.toml
          sed -i "s|{CF_CRONS}|${{ vars.CF_CRONS }}|g" wrangler.toml

      - name: 部署 Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          command: deploy

      - name: 执行 D1 数据库迁移
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          command: d1 migrations apply domain-monitor-db --remote

      - name: 设置 Worker Secret
        run: echo "${{ secrets.PASSWORD }}" | npx wrangler secret put PASSWORD
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
